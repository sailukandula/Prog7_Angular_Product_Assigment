<h2>Product List</h2>

<table border="1">
  <tr>
    <th>ID</th><th>Name</th><th>Price</th><th>Type</th><th>Actions</th>
  </tr>

  @for (p of products; track $index)
  {
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.price }}</td>
      <td>{{ p.type }}</td>

      <td>
        <a [routerLink]="['/update', p.id]">Update</a> |
        <a [routerLink]="['/delete', p.id]">Delete</a>
      </td>
    </tr>
  }
</table>

<button routerLink="/add">Add Product</button>
