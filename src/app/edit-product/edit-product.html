<h2>Edit Product</h2>

<div *ngIf="product">
  <form (ngSubmit)="update()">
    <label>ID:</label>
    <input type="text" [(ngModel)]="product.id" name="id" readonly>

    <label>Name:</label>
    <input type="text" [(ngModel)]="product.name" name="name">

    <label>Price:</label>
    <input type="text" [(ngModel)]="product.price" name="price">

    <label>Type:</label>
    <input type="text" [(ngModel)]="product.type" name="type">

    <button type="submit">Update</button>
  </form>
</div>
